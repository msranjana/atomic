name: Bump Version

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  bump:
    if: >-
      startsWith(github.head_ref, 'release/')
      || startsWith(github.head_ref, 'prerelease/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.head_ref }}"
          VERSION=$(echo "$BRANCH" | sed -E 's#^(release|prerelease)/v##')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Run bump-version script
        run: bun packages/atomic/script/bump-version.ts "${{ steps.version.outputs.version }}"

      - name: Update lockfile
        run: bun install

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit version bump
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): bump version to v${{ steps.version.outputs.version }}"
          git push
