name: Publish
run-name: Publish ${{ github.event.inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*-alpha.[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g., 0.9.10 or 0.9.10-alpha.1)"
        required: true
        type: string
      source_ref:
        description: "Source ref to build/publish (defaults to tag; use only for release recovery)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  SOURCE_REF: ${{ github.event.inputs.source_ref || github.event.inputs.tag || github.ref_name }}
  PACKAGE_DIR: packages/coding-agent
  GLIBC_FLOOR: "2.17"
  RUSTUP_TOOLCHAIN: "1.97.0"

jobs:
  integrity:
    name: Verify release tag
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      sha: ${{ steps.verify.outputs.sha }}
      version: ${{ steps.verify.outputs.version }}
      npm-tag: ${{ steps.verify.outputs.npm-tag }}
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Verify tag commit identity
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          version_re='(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-alpha\.[1-9][0-9]*)?'
          [[ "$RELEASE_TAG" =~ ^$version_re$ ]] || { echo "Invalid release tag: $RELEASE_TAG" >&2; exit 1; }
          git fetch --force origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          sha=$(git rev-parse HEAD^{commit})
          tag_sha=$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")
          [[ "$sha" == "$tag_sha" ]] || { echo "Source ref does not resolve to tag commit $tag_sha" >&2; exit 1; }
          version=$(bun -e 'console.log((await Bun.file("packages/coding-agent/package.json").json()).version)')
          [[ "$version" == "$RELEASE_TAG" ]] || { echo "Package version $version does not match tag $RELEASE_TAG" >&2; exit 1; }
          subject=$(git show -s --format=%s HEAD)
          [[ "$subject" == "Release $RELEASE_TAG" ]] || { echo "Commit subject must be Release $RELEASE_TAG; found: $subject" >&2; exit 1; }
          npm_tag=latest
          [[ "$version" == *-alpha.* ]] && npm_tag=next
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "npm-tag=$npm_tag" >> "$GITHUB_OUTPUT"

  native-artifacts:
    name: Native ${{ matrix.platform }} ${{ matrix.arch }}
    needs: integrity
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: blacksmith-4vcpu-ubuntu-2404, platform: linux, arch: x64, target: x86_64-unknown-linux-gnu }
          - { runner: blacksmith-4vcpu-ubuntu-2404-arm, platform: linux, arch: arm64, target: aarch64-unknown-linux-gnu }
          - { runner: macos-26-intel, platform: darwin, arch: x64, target: x86_64-apple-darwin }
          - { runner: blacksmith-6vcpu-macos-26, platform: darwin, arch: arm64, target: aarch64-apple-darwin }
          - { runner: blacksmith-4vcpu-ubuntu-2404, platform: win32, arch: x64, target: x86_64-pc-windows-msvc }
          - { runner: blacksmith-4vcpu-ubuntu-2404, platform: win32, arch: arm64, target: aarch64-pc-windows-msvc }
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # rustup needs the bare target. Linux's napi build separately receives
      # the glibc-suffixed target consumed by cargo-zigbuild.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          targets: ${{ matrix.target }}
      - name: Prefer pinned rustup toolchain on macOS
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          toolchain_bin="$(dirname "$(rustup which cargo)")"
          echo "$toolchain_bin" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Resolve explicit native build target
        id: target
        shell: bash
        env:
          BARE_TARGET: ${{ matrix.target }}
          TARGET_PLATFORM: ${{ matrix.platform }}
        run: |
          build_target="$BARE_TARGET"
          [[ "$TARGET_PLATFORM" != linux ]] || build_target="${BARE_TARGET}.${GLIBC_FLOOR}"
          echo "build-target=$build_target" >> "$GITHUB_OUTPUT"
      - name: Set baseline x64 CPU flags
        if: matrix.arch == 'x64'
        shell: bash
        run: echo 'RUSTFLAGS=-C target-cpu=x86-64-v2' >> "$GITHUB_ENV"
      - name: Setup zig for portable Linux GNU builds
        if: matrix.platform == 'linux'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install cargo-zigbuild for portable Linux GNU builds
        if: matrix.platform == 'linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - name: Install Windows cross-compile tooling
        if: matrix.platform == 'win32'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm
      - name: Install cargo-xwin
        if: matrix.platform == 'win32'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin
      - name: Build native binding
        env:
          CROSS_TARGET: ${{ matrix.platform != 'darwin' && steps.target.outputs.build-target || '' }}
          NATIVE_TARGET: ${{ matrix.platform == 'darwin' && matrix.target || '' }}
          XWIN_ACCEPT_LICENSE: "1"
        run: bun run --cwd packages/natives build
      - uses: actions/upload-artifact@v7
        with:
          name: atomic-natives-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/natives/native/*.node
          if-no-files-found: error
          retention-days: 14

  linux-binary-smoke:
    name: Smoke Linux binary
    needs: integrity
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
      - name: Build Linux x64 archive
        run: ./scripts/build-binaries.sh --skip-deps --platform linux-x64
      - name: Smoke Linux release archive
        shell: bash
        run: |
          set -euo pipefail
          smoke="$RUNNER_TEMP/atomic-linux-smoke"
          mkdir -p "$smoke"
          tar -xzf packages/coding-agent/binaries/atomic-linux-x64.tar.gz -C "$smoke"
          "$smoke/atomic/atomic" --version
          for path in app.js image-resize-worker.js builtin/workflows/package.json builtin/subagents/package.json builtin/mcp/package.json builtin/web-access/package.json builtin/intercom/package.json builtin/cursor/package.json node_modules/@bastani/atomic-natives/package.json node_modules/@bastani/atomic-natives/native/atomic_natives.linux-x64-gnu.node node_modules/@modelcontextprotocol/ext-apps/package.json node_modules/@mozilla/readability/package.json; do
            test -f "$smoke/atomic/$path" || { echo "Missing release archive path: $path" >&2; exit 1; }
          done
          mkdir -p "$RUNNER_TEMP/atomic-linux-cwd"
          set +e
          output=$(cd "$RUNNER_TEMP/atomic-linux-cwd" && printf '' | "$smoke/atomic/atomic" --no-session 2>&1)
          status=$?
          set -e
          echo "$output"
          ! grep -q 'Failed to load extension' <<<"$output"
          [[ "$status" -eq 0 ]] || grep -Eq 'No models available|No model selected|No API key found' <<<"$output"

  windows-binary-smoke:
    name: Smoke Windows binary
    needs: integrity
    runs-on: blacksmith-4vcpu-windows-2025
    timeout-minutes: 15
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
      - name: Build Windows x64 archive
        shell: bash
        run: ./scripts/build-binaries.sh --skip-deps --platform windows-x64
      - name: Smoke Windows release archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $smoke = Join-Path $env:RUNNER_TEMP "atomic-windows-smoke"
          New-Item -ItemType Directory -Force -Path $smoke | Out-Null
          Expand-Archive packages/coding-agent/binaries/atomic-windows-x64.zip $smoke -Force
          $atomic = Join-Path $smoke "atomic.exe"
          & $atomic --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          foreach ($path in @("app.js", "image-resize-worker.js", "builtin/workflows/package.json", "builtin/subagents/package.json", "builtin/mcp/package.json", "builtin/web-access/package.json", "builtin/intercom/package.json", "builtin/cursor/package.json", "node_modules/@bastani/atomic-natives/package.json", "node_modules/@bastani/atomic-natives/native/atomic_natives.win32-x64-msvc.node", "native/win32/prebuilds/win32-x64/win32-console-mode.node", "node_modules/@modelcontextprotocol/ext-apps/package.json", "node_modules/@mozilla/readability/package.json")) {
            if (-not (Test-Path (Join-Path $smoke $path))) { throw "Missing release archive path: $path" }
          }
          $cwd = Join-Path $env:RUNNER_TEMP "atomic-windows-cwd"
          New-Item -ItemType Directory -Force -Path $cwd | Out-Null
          Push-Location $cwd
          $output = "" | & $atomic --no-session 2>&1 | Out-String
          $status = $LASTEXITCODE
          Pop-Location
          Write-Host $output
          if ($output -match "Failed to load extension") { exit 1 }
          if ($status -ne 0 -and $output -notmatch "No models available|No model selected|No API key found") { exit $status }

  build:
    name: Build release payload
    needs: [integrity, native-artifacts, linux-binary-smoke, windows-binary-smoke]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: useblacksmith/checkout@v1
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install dependencies and verify shrinkwrap
        run: |
          bun install --frozen-lockfile
          bun run check:shrinkwrap
      - name: Download native bindings
        uses: actions/download-artifact@v8
        with:
          pattern: atomic-natives-*
          path: packages/natives/native
          merge-multiple: true
      - name: Prepare native packages
        run: |
          bun run --cwd packages/natives create-npm-dirs
          bun run --cwd packages/natives artifacts
          bun run --cwd packages/natives prepublish:native -- --skip-optional-publish
      - name: Build release archives
        run: ./scripts/build-binaries.sh --skip-install
      - name: Validate package metadata and prepare payload
        env:
          VERSION: ${{ needs.integrity.outputs.version }}
        run: |
          set -euo pipefail
          bun -e '
            import { existsSync, readdirSync } from "node:fs";
            const atomic = await Bun.file("packages/coding-agent/package.json").json();
            const natives = await Bun.file("packages/natives/package.json").json();
            const failures = [];
            if (atomic.name !== "@bastani/atomic" || atomic.version !== process.env.VERSION || atomic.private) failures.push("invalid @bastani/atomic identity");
            if (atomic.bin?.atomic !== "dist/cli.js") failures.push("invalid atomic bin metadata");
            if (natives.name !== "@bastani/atomic-natives" || natives.version !== process.env.VERSION || natives.private) failures.push("invalid native root identity");
            for (const entry of readdirSync("packages", { withFileTypes: true })) {
              if (!entry.isDirectory()) continue;
              const path = `packages/${entry.name}/package.json`;
              if (!existsSync(path)) continue;
              const pkg = await Bun.file(path).json();
              if (pkg.version !== process.env.VERSION) failures.push(`${path} has version ${pkg.version}`);
              if (!["@bastani/atomic", "@bastani/atomic-natives"].includes(pkg.name) && pkg.private !== true) failures.push(`${pkg.name} must remain private`);
            }
            for (const pkg of [atomic, natives]) for (const deps of [pkg.dependencies, pkg.optionalDependencies, pkg.peerDependencies]) for (const [name, range] of Object.entries(deps ?? {})) if (String(range).startsWith("workspace:")) failures.push(`workspace range: ${name}`);
            for (const path of [atomic.main, atomic.types, atomic.bin?.atomic, "dist/builtin", "dist/builtin/workflows/package.json", "dist/builtin/subagents/package.json", "dist/builtin/mcp/package.json", "dist/builtin/web-access/package.json", "dist/builtin/intercom/package.json", "dist/builtin/cursor/package.json"]) if (!path || !existsSync(`packages/coding-agent/${path}`)) failures.push(`missing ${path}`);
            for (const native of ["darwin-arm64","darwin-x64","linux-arm64-gnu","linux-x64-gnu","win32-arm64-msvc","win32-x64-msvc"]) if (!existsSync(`packages/natives/native/atomic_natives.${native}.node`)) failures.push(`missing native ${native}`);
            if (failures.length) throw new Error(failures.join("\n"));'
          rm -rf release-assets npm-packages
          mkdir release-assets npm-packages
          cp packages/coding-agent/binaries/atomic-*.tar.gz packages/coding-agent/binaries/atomic-*.zip release-assets/
          awk -v ver="$VERSION" 'BEGIN { found=0 } /^## \[/ { if (found) exit; if ($0 ~ "^## \\[" ver "\\]") { found=1; next } } found { print }' packages/coding-agent/CHANGELOG.md > release-assets/RELEASE_NOTES.md
          test -s release-assets/RELEASE_NOTES.md || echo "Release $VERSION" > release-assets/RELEASE_NOTES.md
          (cd release-assets && sha256sum atomic-*.tar.gz atomic-*.zip > SHA256SUMS)
          for dir in packages/natives/npm/* packages/natives packages/coding-agent; do npm pack "$dir" --pack-destination npm-packages; done
          test "$(find npm-packages -name '*.tgz' -type f | wc -l | tr -d ' ')" = 8
          bun -e '
            const expected = new Set(["@bastani/atomic-natives-darwin-arm64","@bastani/atomic-natives-darwin-x64","@bastani/atomic-natives-linux-arm64-gnu","@bastani/atomic-natives-linux-x64-gnu","@bastani/atomic-natives-win32-arm64-msvc","@bastani/atomic-natives-win32-x64-msvc"]);
            const root = await Bun.file("packages/natives/package.json").json();
            const actual = Object.keys(root.optionalDependencies ?? {});
            if (actual.length !== 6 || actual.some((name) => !expected.has(name) || root.optionalDependencies[name] !== process.env.VERSION)) throw new Error("native optionalDependencies must be the six exact-version platform packages");'
      - name: Upload release payload
        uses: actions/upload-artifact@v7
        with:
          name: release-payload-${{ env.RELEASE_TAG }}
          path: |
            release-assets
            npm-packages
          if-no-files-found: error
          retention-days: 14

  stage-github-release:
    name: Stage draft GitHub Release
    needs: [integrity, build]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-payload-${{ env.RELEASE_TAG }}
      - name: Validate and stage draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum -c SHA256SUMS
          existing=$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft 2>/dev/null || true)
          [[ "$existing" != false ]] || { echo "GitHub Release $RELEASE_TAG is already published. Refusing to mutate a public release." >&2; exit 1; }
          [[ "$existing" != true ]] || gh release delete "$RELEASE_TAG" --yes
          assets=(atomic-darwin-arm64.tar.gz atomic-darwin-x64.tar.gz atomic-linux-x64.tar.gz atomic-linux-arm64.tar.gz atomic-windows-x64.zip atomic-windows-arm64.zip SHA256SUMS)
          gh release create "$RELEASE_TAG" --verify-tag --draft --title "$RELEASE_TAG" --notes-file RELEASE_NOTES.md "${assets[@]}"
          expected=$(printf '%s\n' "${assets[@]}" | sort)
          actual=$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | sort)
          [[ "$actual" == "$expected" ]] || { echo "Draft release asset set mismatch" >&2; exit 1; }

  publish-npm:
    name: Publish npm packages
    needs: [integrity, stage-github-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-payload-${{ env.RELEASE_TAG }}
          path: payload
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.16.0 --ignore-scripts
      - name: Publish native packages then coding agent
        env:
          VERSION: ${{ needs.integrity.outputs.version }}
          NPM_TAG: ${{ needs.integrity.outputs.npm-tag }}
        run: |
          set -euo pipefail
          declare -A tarballs=()
          for file in payload/npm-packages/*.tgz; do
            name=$(tar -xOf "$file" package/package.json | jq -er .name)
            version=$(tar -xOf "$file" package/package.json | jq -er .version)
            [[ "$version" == "$VERSION" ]] || { echo "$name has version $version, expected $VERSION" >&2; exit 1; }
            tarballs[$name]="$file"
          done
          packages=(@bastani/atomic-natives-darwin-arm64 @bastani/atomic-natives-darwin-x64 @bastani/atomic-natives-linux-arm64-gnu @bastani/atomic-natives-linux-x64-gnu @bastani/atomic-natives-win32-arm64-msvc @bastani/atomic-natives-win32-x64-msvc @bastani/atomic-natives @bastani/atomic)
          [[ "${#tarballs[@]}" -eq "${#packages[@]}" ]] || { echo "Expected exactly eight npm packages" >&2; exit 1; }
          for name in "${packages[@]}"; do
            [[ -n "${tarballs[$name]:-}" ]] || { echo "Missing package $name" >&2; exit 1; }
            if npm view "$name@$VERSION" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
              echo "$name@$VERSION already exists; skipping."
            else
              npm publish "${tarballs[$name]}" --provenance --access public --tag "$NPM_TAG" --registry https://registry.npmjs.org
            fi
          done

  publish-github-release:
    name: Publish GitHub Release
    needs: [stage-github-release, publish-npm]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Publish staged GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          existing=$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft 2>/dev/null || true)
          [[ "$existing" == true ]] || { echo "Draft GitHub Release $RELEASE_TAG does not exist." >&2; exit 1; }
          gh release edit "$RELEASE_TAG" --draft=false --prerelease=${{ contains(env.RELEASE_TAG, '-') }} --latest=${{ contains(env.RELEASE_TAG, '-') && 'false' || 'true' }}

  cleanup-draft-github-release:
    name: Clean up failed draft GitHub Release
    needs: [build, stage-github-release, publish-npm, publish-github-release]
    if: ${{ always() && needs.stage-github-release.result != 'skipped' && (needs.stage-github-release.result != 'success' || needs.publish-npm.result != 'success' || needs.publish-github-release.result != 'success') }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Delete draft GitHub Release after failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft 2>/dev/null || true)
          [[ "$existing" != true ]] || gh release delete "$RELEASE_TAG" --yes
